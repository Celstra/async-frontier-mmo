services:
  postgres:
    image: postgres:16-alpine
    container_name: async-frontier-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: async_frontier
      POSTGRES_PASSWORD: async_frontier
      POSTGRES_DB: async_frontier
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
